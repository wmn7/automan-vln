<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 430" role="img" aria-labelledby="title desc">
  <title id="title">SAGE-NAV Method Overview Placeholder</title>
  <desc id="desc">A horizontal overview showing human demonstrations transformed into frontier-collapse supervision, candidate-wise BEV grounded decisions, and transferable waypoint commands.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfaf7"/>
      <stop offset="1" stop-color="#edf5f2"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#16212b"/>
      <stop offset="1" stop-color="#263238"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2f6f73"/>
    </marker>
    <style>
      .label{font-family:"Google Sans","Noto Sans",Arial,sans-serif;font-size:26px;font-weight:800;fill:#1f2937}
      .small{font-family:"Noto Sans",Arial,sans-serif;font-size:18px;font-weight:650;fill:#55616d}
      .tiny{font-family:"Noto Sans",Arial,sans-serif;font-size:15px;font-weight:700;fill:#667085}
      .pill{font-family:"Noto Sans",Arial,sans-serif;font-size:14px;font-weight:800;letter-spacing:.08em;fill:#9a3412}
    </style>
  </defs>
  <rect width="1440" height="430" rx="26" fill="url(#panel)"/>
  <rect x="42" y="36" width="1356" height="358" rx="22" fill="#fff" opacity=".72"/>

  <g transform="translate(80 74)">
    <rect width="270" height="282" rx="18" fill="#fbfaf7" stroke="#d7ddd9"/>
    <text x="24" y="46" class="pill">INPUT</text>
    <text x="24" y="84" class="label">Human demos</text>
    <text x="24" y="120" class="small">Low-level trajectories</text>
    <text x="24" y="148" class="small">under partial observability</text>
    <path d="M54 222 C96 170 142 254 212 178" fill="none" stroke="#f97316" stroke-width="7" stroke-linecap="round"/>
    <circle cx="54" cy="222" r="13" fill="#2f6f73"/>
    <circle cx="212" cy="178" r="15" fill="#9a3412"/>
    <circle cx="132" cy="207" r="9" fill="#7cc7b2"/>
  </g>

  <line x1="372" y1="215" x2="470" y2="215" stroke="#2f6f73" stroke-width="5" marker-end="url(#arrow)"/>

  <g transform="translate(490 74)">
    <rect width="310" height="282" rx="18" fill="#f3f6f4" stroke="#d7ddd9"/>
    <text x="24" y="46" class="pill">SUPERVISION</text>
    <text x="24" y="84" class="label">Frontier collapse</text>
    <text x="24" y="120" class="small">Recover BEV waypoint labels</text>
    <text x="24" y="148" class="small">without oracle shortest paths</text>
    <rect x="42" y="183" width="226" height="66" rx="12" fill="url(#dark)"/>
    <path d="M68 216 H128 V198 H192 V229 H244" fill="none" stroke="#7cc7b2" stroke-width="5" stroke-linecap="round"/>
    <circle cx="68" cy="216" r="8" fill="#f3efe4"/>
    <circle cx="128" cy="198" r="8" fill="#f97316"/>
    <circle cx="192" cy="229" r="8" fill="#f97316"/>
    <circle cx="244" cy="229" r="10" fill="#9a3412"/>
  </g>

  <line x1="822" y1="215" x2="920" y2="215" stroke="#2f6f73" stroke-width="5" marker-end="url(#arrow)"/>

  <g transform="translate(940 74)">
    <rect width="310" height="282" rx="18" fill="#fbfaf7" stroke="#d7ddd9"/>
    <text x="24" y="46" class="pill">POLICY</text>
    <text x="24" y="84" class="label">Candidate-wise BEV</text>
    <text x="24" y="120" class="small">Shared frontier-target space</text>
    <text x="24" y="148" class="small">with egocentric visual memory</text>
    <rect x="36" y="178" width="238" height="78" rx="13" fill="#16212b"/>
    <circle cx="82" cy="218" r="13" fill="#f97316"/>
    <circle cx="140" cy="205" r="13" fill="#f97316"/>
    <circle cx="206" cy="223" r="16" fill="#7cc7b2"/>
    <path d="M64 252 L82 218 L140 205 L206 223 L250 192" fill="none" stroke="#f3efe4" stroke-width="3" opacity=".72"/>
  </g>

  <line x1="1272" y1="215" x2="1342" y2="215" stroke="#2f6f73" stroke-width="5" marker-end="url(#arrow)"/>

  <g transform="translate(1186 94)">
    <rect x="160" y="54" width="42" height="42" rx="21" fill="#2f6f73"/>
    <rect x="149" y="120" width="64" height="38" rx="10" fill="#f97316"/>
    <rect x="158" y="184" width="48" height="62" rx="12" fill="#7cc7b2"/>
    <text x="42" y="86" class="tiny">wheeled</text>
    <text x="42" y="148" class="tiny">Go2</text>
    <text x="42" y="224" class="tiny">G1</text>
  </g>

  <text x="80" y="405" class="tiny">Waypoint-level decisions transfer across wheeled, quadruped, and humanoid navigation stacks.</text>
</svg>
